<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RoundTrack</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#060b14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoundTrack">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #060b14;
  --surf:      #0d1626;
  --surf2:     #131f35;
  --border:    #1a2840;
  --border2:   #243554;
  --teal:      #00d4aa;
  --teal-dim:  #009e80;
  --teal-bg:   rgba(0,212,170,.12);
  --amber:     #f0a500;
  --red:       #e84545;
  --text:      #d8e8f8;
  --dim:       #5a7090;
  --muted:     #2a3d58;
  --sans: 'Outfit', sans-serif;
  --mono: 'DM Mono', monospace;
  --top: env(safe-area-inset-top, 0px);
  --bot: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex; flex-direction: column;
  height: 100%; height: 100dvh;
  padding-top: var(--top);
  padding-bottom: var(--bot);
}

.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; animation: fadeIn .15s ease; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ── SETUP ─────────────────────────────────────── */
#setup {
  justify-content: center; align-items: center;
  padding: 28px 24px; gap: 28px;
}

.logo { text-align: center; }
.logo-eyebrow {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 5px; text-transform: uppercase; color: var(--teal);
  margin-bottom: 2px;
}
.logo-name {
  font-size: 52px; font-weight: 900; letter-spacing: -2px; line-height: 1;
  background: linear-gradient(140deg, #c8ddf5 20%, var(--teal) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.resume-banner {
  width: 100%; max-width: 360px;
  background: var(--teal-bg); border: 1.5px solid var(--teal);
  border-radius: 14px; padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: opacity .15s;
}
.resume-banner:active { opacity: .75; }
.resume-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--teal);
  flex-shrink: 0; animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.resume-text { flex: 1; }
.resume-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); }
.resume-sub { font-family: var(--mono); font-size: 13px; color: var(--dim); margin-top: 1px; }
.resume-arrow { color: var(--teal); font-size: 20px; }

.setup-label {
  font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--dim); text-align: center;
}

.count-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; width: 100%; max-width: 360px;
}
.cnt-btn {
  background: var(--surf); border: 1.5px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 22px; font-weight: 500;
  padding: 17px 0; border-radius: 12px; cursor: pointer;
  transition: background .12s, border-color .12s, color .12s, transform .1s;
  text-align: center; line-height: 1;
}
.cnt-btn:active { transform: scale(.94); }
.cnt-btn.sel { background: var(--teal-bg); border-color: var(--teal); color: var(--teal); }

.custom-row {
  display: flex; align-items: center; gap: 10px;
  width: 100%; max-width: 360px;
}
.custom-row label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--dim); white-space: nowrap;
}
.custom-row input {
  flex: 1; background: var(--surf); border: 1.5px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 20px; font-weight: 500;
  padding: 12px; border-radius: 10px; text-align: center; outline: none;
  -webkit-appearance: none; -webkit-text-fill-color: var(--text);
}
.custom-row input:focus { border-color: var(--teal); }

.start-btn {
  width: 100%; max-width: 360px;
  background: var(--teal); color: #060b14;
  border: none; font-family: var(--sans); font-size: 17px; font-weight: 800;
  letter-spacing: .5px; padding: 18px; border-radius: 14px; cursor: pointer;
  transition: opacity .1s, transform .1s;
}
.start-btn:active { transform: scale(.97); opacity: .88; }

.setup-footer {
  display: flex; gap: 24px; align-items: center;
}
.text-link {
  font-family: var(--mono); font-size: 12px; color: var(--dim);
  cursor: pointer; letter-spacing: .5px; padding: 6px 2px;
  border-bottom: 1px solid transparent; transition: color .15s, border-color .15s;
}
.text-link:active { color: var(--teal); border-color: var(--teal); }

/* ── SESSION ────────────────────────────────────── */
#session { overflow: hidden; }

.sess-header {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 6px;
  padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.hdr-block { display: flex; flex-direction: column; }
.hdr-block.right { align-items: flex-end; }

.hdr-label {
  font-family: var(--mono); font-size: 9px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 1px;
}
.hdr-val {
  font-family: var(--mono); font-size: 22px; font-weight: 500;
  color: var(--teal); line-height: 1; transition: color .4s;
}
.hdr-val.warn { color: var(--amber); }
.hdr-val.danger { color: var(--red); animation: throb .8s ease-in-out infinite; }
.hdr-val.late { color: var(--dim); font-size: 15px; }
@keyframes throb { 0%,100%{opacity:1}50%{opacity:.6} }

.hdr-center { text-align: center; }
.hdr-fraction {
  font-family: var(--mono); font-size: 32px; font-weight: 500; line-height: 1;
}
.hdr-fraction .done { color: var(--teal); }
.hdr-fraction .sep { color: var(--muted); }
.hdr-fraction .total { color: var(--dim); }
.hdr-center-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
}

/* Progress strip */
.progress-strip { height: 3px; background: var(--border); flex-shrink: 0; }
.progress-fill { height: 100%; background: var(--teal); transition: width .4s ease; }

/* Patient grid */
.patients-wrap {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px;
}
.patient-grid { display: grid; gap: 10px; }

.pt-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--surf); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 16px 18px;
  cursor: pointer; transition: border-color .18s, background .18s;
  min-height: 74px; position: relative; overflow: hidden;
  -webkit-user-select: none; user-select: none;
}
.pt-card::after {
  content: ''; position: absolute; inset: 0;
  background: var(--teal-bg); opacity: 0; transition: opacity .18s; border-radius: 13px;
}
.pt-card.active { border-color: var(--teal); }
.pt-card.active::after { opacity: 1; }
.pt-card.done { border-color: rgba(0,212,170,.25); opacity: .72; }

/* Tap ripple */
.pt-card:active { transform: scale(.98); }

.pt-icon {
  width: 38px; height: 38px; border-radius: 50%;
  border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: border-color .18s, background .18s; z-index: 1;
}
.pt-card.active .pt-icon {
  border-color: var(--teal); background: var(--teal-bg);
  animation: pulse 1.6s ease-in-out infinite;
}
.pt-card.done .pt-icon { border-color: var(--teal-dim); background: rgba(0,158,128,.18); }
@keyframes pulse {
  0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,.5)}
  60%{box-shadow:0 0 0 8px rgba(0,212,170,0)}
}

.pt-icon svg { width: 17px; height: 17px; display: block; }

.pt-body { flex: 1; z-index: 1; min-width: 0; }
.pt-action {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); transition: color .18s;
}
.pt-card.active .pt-action { color: var(--teal); }
.pt-card.done .pt-action { color: var(--dim); }
.pt-time {
  font-family: var(--mono); font-size: 24px; font-weight: 500;
  color: var(--text); line-height: 1.2; margin-top: 1px; transition: color .18s;
}
.pt-card.active .pt-time { color: var(--teal); }
.pt-card.done .pt-time { color: var(--teal-dim); }

.pt-num {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  letter-spacing: 1px; z-index: 1;
}
.pt-card.active .pt-num { color: var(--teal); }

/* Session footer */
.sess-footer {
  display: flex; gap: 8px; padding: 10px 14px 12px;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.foot-tile {
  flex: 1; background: var(--surf); border-radius: 10px;
  padding: 9px 10px; text-align: center;
}
.foot-tile.tap { cursor: pointer; }
.foot-tile.tap:active { background: var(--surf2); }
.foot-lbl { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.foot-val { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); margin-top: 2px; }

/* ── STATS ──────────────────────────────────────── */
#stats { overflow: hidden; }

.stats-hdr {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surf); border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; color: var(--text);
  transition: border-color .15s, color .15s;
}
.back-btn:active { border-color: var(--teal); color: var(--teal); }
.stats-title { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }

.stats-body {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px 14px; display: flex; flex-direction: column; gap: 14px;
}

.sec-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--dim); margin-bottom: -6px;
}

.stat-card {
  background: var(--surf); border: 1.5px solid var(--border); border-radius: 14px;
  overflow: hidden;
}

.stat-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
}
.stat-cell {
  background: var(--surf); padding: 16px 14px; text-align: center;
}
.stat-cell.span2 { grid-column: span 2; }
.cell-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.cell-val { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--text); line-height: 1; }
.cell-val.accent { color: var(--teal); }
.cell-val.sm { font-size: 20px; }
.cell-sub { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 3px; }

.pbar-wrap { height: 4px; background: var(--border); }
.pbar-fill { height: 100%; background: var(--teal); transition: width .5s ease; }

.hist-list { display: flex; flex-direction: column; }
.hist-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.hist-row:last-child { border-bottom: none; }
.hist-date { font-family: var(--mono); font-size: 11px; color: var(--dim); min-width: 90px; }
.hist-pts { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--text); min-width: 44px; }
.hist-pts span { font-size: 11px; color: var(--muted); }
.hist-avg { font-family: var(--mono); font-size: 12px; color: var(--dim); flex: 1; text-align: right; }
.hist-badge {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px; font-weight: 500;
  padding: 3px 8px; border-radius: 20px;
  background: rgba(0,212,170,.12); color: var(--teal);
}
.hist-badge.late { background: rgba(232,69,69,.12); color: var(--red); }

.empty-msg {
  text-align: center; color: var(--muted); font-family: var(--mono);
  font-size: 13px; padding: 40px 20px; letter-spacing: .5px; line-height: 2;
}

.danger-zone {
  text-align: center; padding: 8px 0 4px;
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  cursor: pointer; letter-spacing: 1px;
  border-top: 1px solid var(--border); margin-top: 4px; padding-top: 16px;
}
.danger-zone:active { color: var(--red); }

/* Scrollbars */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>

</head>

<script>
// ═══════════════════════════════════════════
//  ROUNDTRACK  –  Hospital Notes Tracker
// ═══════════════════════════════════════════

// ── Persistence ──────────────────────────────
const STORE_KEY   = 'rt_data_v2';
const SESSION_KEY = 'rt_session_v2';

function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function saveStore(obj) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(obj)); } catch {}
}
function loadSavedSession() {
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (s && s.date === today()) return s;
  } catch {}
  return null;
}
function saveCurrentSession() {
  if (S.session) {
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(S.session)); } catch {}
  }
}
function clearCurrentSession() {
  localStorage.removeItem(SESSION_KEY);
}

// ── State ─────────────────────────────────────
const S = {
  screen: 'setup',
  session: null,
  selectedCount: null,
};

let store = loadStore();         // { lastCount, history: [...] }
store.history = store.history || [];
store.lastCount = store.lastCount || null;

// ── Utils ─────────────────────────────────────
function today() { return new Date().toISOString().slice(0, 10); }

function fmtMs(ms) {
  if (ms == null || ms < 0) ms = 0;
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function fmtMsShort(ms) {
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return m > 0 ? `${m}m${s ? s + 's' : ''}` : `${s}s`;
}

function msUntil0800() {
  const now = new Date();
  const dl  = new Date(); dl.setHours(8, 0, 0, 0);
  return dl - now;            // negative = past deadline
}

function fmtCountdown(ms) {
  const abs  = Math.abs(ms);
  const secs = Math.floor(abs / 1000);
  const mins = Math.floor(secs / 60);
  const hrs  = Math.floor(mins / 60);
  const ss   = String(secs % 60).padStart(2, '0');
  const mm   = String(mins % 60).padStart(2, '0');
  if (ms < 0) return hrs > 0 ? `+${hrs}h${mm}m` : `+${mins}m`;
  return hrs > 0 ? `${hrs}:${mm}:${ss}` : `${mins}:${ss}`;
}

function estimateDone() {
  if (!S.session) return null;
  const done = S.session.patients.filter(p => p.status === 'done');
  const rem  = S.session.patients.filter(p => p.status !== 'done');
  if (!done.length || !rem.length) return null;
  const avg = done.reduce((s, p) => s + (p.endTime - p.startTime), 0) / done.length;
  const eta = new Date(Date.now() + avg * rem.length);
  return `${String(eta.getHours()).padStart(2,'0')}:${String(eta.getMinutes()).padStart(2,'0')}`;
}

// ── Setup Screen ──────────────────────────────
const PRESETS = [6, 8, 10, 12, 14, 16, 18, 20];

function initSetup() {
  // Populate preset buttons
  const grid = document.getElementById('count-grid');
  grid.innerHTML = '';
  PRESETS.forEach(n => {
    const b = document.createElement('button');
    b.className = 'cnt-btn' + (S.selectedCount === n ? ' sel' : '');
    b.textContent = n;
    b.addEventListener('click', () => { selectCount(n); document.getElementById('custom-input').value = ''; });
    grid.appendChild(b);
  });

  // Custom input
  const ci = document.getElementById('custom-input');
  if (S.selectedCount && !PRESETS.includes(S.selectedCount)) ci.value = S.selectedCount;
  else ci.value = '';

  // Resume banner
  const saved = loadSavedSession();
  const rb = document.getElementById('resume-banner');
  if (saved && saved.patients.some(p => p.status !== 'done')) {
    const done = saved.patients.filter(p => p.status === 'done').length;
    document.getElementById('resume-sub').textContent =
      `${done}/${saved.patientCount} done · tap to continue`;
    rb.style.display = 'flex';
    rb.onclick = () => resumeSession(saved);
  } else {
    rb.style.display = 'none';
  }
}

function selectCount(n) {
  S.selectedCount = n;
  document.querySelectorAll('.cnt-btn').forEach(b => b.classList.toggle('sel', +b.textContent === n));
}

document.getElementById('custom-input').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  if (v > 0) {
    S.selectedCount = v;
    document.querySelectorAll('.cnt-btn').forEach(b => b.classList.remove('sel'));
  }
});

document.getElementById('start-btn').addEventListener('click', () => {
  const ci = parseInt(document.getElementById('custom-input').value);
  if (ci > 0) S.selectedCount = ci;
  if (!S.selectedCount) { selectCount(10); return; }
  newSession(S.selectedCount);
});

document.getElementById('stats-link').addEventListener('click', () => showStats());

// ── Session ───────────────────────────────────
function newSession(count) {
  S.session = {
    date: today(),
    patientCount: count,
    sessionStart: Date.now(),
    patients: Array.from({ length: count }, (_, i) => ({
      id: i + 1, status: 'ready', startTime: null, endTime: null,
    })),
  };
  store.lastCount = count;
  saveStore(store);
  saveCurrentSession();
  showScreen('session');
}

function resumeSession(saved) {
  S.session = saved;
  showScreen('session');
}

// Render full patient grid
function renderGrid() {
  if (!S.session) return;
  const grid = document.getElementById('patient-grid');
  const n = S.session.patientCount;
  grid.style.gridTemplateColumns = n <= 6 ? '1fr' : n <= 14 ? '1fr 1fr' : '1fr 1fr 1fr';
  grid.innerHTML = '';
  S.session.patients.forEach(p => grid.appendChild(makeCard(p)));
  updateHeader();
}

function makeCard(p) {
  const card = document.createElement('div');
  card.className = `pt-card ${p.status}`;
  card.dataset.id = p.id;

  // Icon SVG
  let icon;
  if (p.status === 'done') {
    icon = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--teal-dim)" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>`;
  } else if (p.status === 'active') {
    icon = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3" fill="var(--teal)"/></svg>`;
  } else {
    icon = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg>`;
  }

  const action = p.status === 'ready' ? 'TAP TO START' : p.status === 'active' ? 'RECORDING' : 'DONE — TAP TO UNDO';
  let timeHTML = '';
  if (p.status === 'active') {
    const el = fmtMs(Date.now() - p.startTime);
    timeHTML = `<div class="pt-time" data-live="${p.id}">${el}</div>`;
  } else if (p.status === 'done') {
    timeHTML = `<div class="pt-time">${fmtMs(p.endTime - p.startTime)}</div>`;
  }

  card.innerHTML = `
    <div class="pt-icon">${icon}</div>
    <div class="pt-body">
      <div class="pt-action">${action}</div>
      ${timeHTML}
    </div>
    <div class="pt-num">PT ${String(p.id).padStart(2,'0')}</div>
  `;

  card.addEventListener('click', () => tapCard(p.id));
  return card;
}

function tapCard(id) {
  const p = S.session.patients.find(x => x.id === id);
  if (!p) return;

  if (p.status === 'ready') {
    p.status = 'active'; p.startTime = Date.now();
  } else if (p.status === 'active') {
    p.status = 'done'; p.endTime = Date.now();
  } else {
    // undo done → back to active
    p.status = 'active'; p.endTime = null;
  }

  saveCurrentSession();

  // Re-render just this card (avoid full grid re-render for performance)
  const old = document.querySelector(`.pt-card[data-id="${id}"]`);
  if (old) old.replaceWith(makeCard(p));
  updateHeader();

  // Check completion
  if (S.session.patients.every(x => x.status === 'done')) finaliseSession();
}

function updateHeader() {
  if (!S.session) return;
  const done = S.session.patients.filter(p => p.status === 'done');
  const n = S.session.patientCount;
  document.getElementById('hdr-done').textContent  = done.length;
  document.getElementById('hdr-total').textContent = n;

  // Progress bar
  document.getElementById('progress-fill').style.width = `${(done.length / n * 100).toFixed(1)}%`;

  if (done.length > 0) {
    const durs = done.map(p => p.endTime - p.startTime);
    const avg  = durs.reduce((a,b) => a+b, 0) / durs.length;
    document.getElementById('hdr-avg').textContent   = fmtMs(avg);
    document.getElementById('foot-fast').textContent = fmtMs(Math.min(...durs));
    document.getElementById('foot-slow').textContent = fmtMs(Math.max(...durs));
    document.getElementById('foot-est').textContent  = estimateDone() || '—';
  } else {
    document.getElementById('hdr-avg').textContent   = '—';
    document.getElementById('foot-fast').textContent = '—';
    document.getElementById('foot-slow').textContent = '—';
    document.getElementById('foot-est').textContent  = '—';
  }
}

function finaliseSession() {
  const done = S.session.patients.filter(p => p.status === 'done');
  const entry = {
    date:        S.session.date,
    patientCount: S.session.patientCount,
    patients:    S.session.patients.map(p => ({...p})),
    completedAt: Date.now(),
    onTime:      msUntil0800() >= 0,
  };
  store.history = [entry, ...store.history.filter(h => h.date !== S.session.date)].slice(0, 60);
  saveStore(store);
  clearCurrentSession();
}

// ── Ticker ────────────────────────────────────
let ticker = null;

function startTicker() {
  stopTicker();
  ticker = setInterval(tick, 1000);
  tick();
}
function stopTicker() { if (ticker) clearInterval(ticker); ticker = null; }

function tick() {
  if (S.screen !== 'session') return;

  // Deadline countdown
  const ms  = msUntil0800();
  const el  = document.getElementById('hdr-deadline');
  if (el) {
    el.textContent = fmtCountdown(ms);
    el.className = 'hdr-val';
    if (ms < 0)            el.classList.add('late');
    else if (ms < 600000)  el.classList.add('danger');  // < 10 min
    else if (ms < 1800000) el.classList.add('warn');    // < 30 min
  }

  // Live timers
  document.querySelectorAll('[data-live]').forEach(el => {
    const p = S.session && S.session.patients.find(x => x.id === +el.dataset.live);
    if (p && p.status === 'active') el.textContent = fmtMs(Date.now() - p.startTime);
  });
}

// Session "more" menu → stats
document.getElementById('sess-menu-btn').addEventListener('click', () => showStats());

// ── Stats Screen ──────────────────────────────
function showStats() {
  buildStats();
  showScreen('stats');
}

function buildStats() {
  const body = document.getElementById('stats-body');
  body.innerHTML = '';

  // ── Today
  const todayEntry = (store.history.find(h => h.date === today()))
    || (S.session ? { ...S.session, onTime: msUntil0800() >= 0 } : null);

  if (todayEntry) {
    body.appendChild(secLabel('Today'));
    const done = todayEntry.patients.filter(p => p.status === 'done');
    const durs = done.map(p => p.endTime - p.startTime);
    const avg  = durs.length ? durs.reduce((a,b)=>a+b,0) / durs.length : 0;
    const fast = durs.length ? Math.min(...durs) : 0;
    const slow = durs.length ? Math.max(...durs) : 0;
    const tot  = durs.reduce((a,b)=>a+b,0);
    const pct  = done.length / todayEntry.patientCount * 100;

    body.appendChild(statCard(`
      <div class="stat-grid">
        <div class="stat-cell"><div class="cell-lbl">Completed</div>
          <div class="cell-val accent">${done.length}<span style="font-size:14px;color:var(--dim)">/${todayEntry.patientCount}</span></div></div>
        <div class="stat-cell"><div class="cell-lbl">Avg / Note</div>
          <div class="cell-val">${durs.length ? fmtMs(avg) : '—'}</div></div>
        <div class="stat-cell"><div class="cell-lbl">Fastest</div>
          <div class="cell-val sm">${durs.length ? fmtMs(fast) : '—'}</div></div>
        <div class="stat-cell"><div class="cell-lbl">Slowest</div>
          <div class="cell-val sm">${durs.length ? fmtMs(slow) : '—'}</div></div>
        <div class="stat-cell span2"><div class="cell-lbl">Total Note Time</div>
          <div class="cell-val sm">${durs.length ? fmtMs(tot) : '—'}</div></div>
      </div>
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct.toFixed(1)}%"></div></div>
    `));
  }

  // ── All-time
  if (store.history.length > 0) {
    body.appendChild(secLabel('All Time'));

    const allDone = store.history.flatMap(h => h.patients.filter(p => p.status === 'done'));
    const allDurs = allDone.map(p => p.endTime - p.startTime);
    const allAvg  = allDurs.length ? allDurs.reduce((a,b)=>a+b,0)/allDurs.length : 0;
    const bestNote= allDurs.length ? Math.min(...allDurs) : 0;
    const totPts  = allDone.length;
    const onTime  = store.history.filter(h => h.onTime).length;
    const avgPts  = (store.history.reduce((s,h)=>s+h.patients.filter(p=>p.status==='done').length,0)/store.history.length).toFixed(1);

    body.appendChild(statCard(`
      <div class="stat-grid">
        <div class="stat-cell"><div class="cell-lbl">Sessions</div>
          <div class="cell-val accent">${store.history.length}</div></div>
        <div class="stat-cell"><div class="cell-lbl">Total Patients</div>
          <div class="cell-val">${totPts}</div></div>
        <div class="stat-cell"><div class="cell-lbl">Avg / Note</div>
          <div class="cell-val sm">${allDurs.length ? fmtMs(allAvg) : '—'}</div></div>
        <div class="stat-cell"><div class="cell-lbl">Best Note</div>
          <div class="cell-val sm">${bestNote ? fmtMs(bestNote) : '—'}</div>
          <div class="cell-sub">personal record</div></div>
        <div class="stat-cell"><div class="cell-lbl">Avg Patients/Day</div>
          <div class="cell-val sm">${avgPts}</div></div>
        <div class="stat-cell"><div class="cell-lbl">Signed by 08:00</div>
          <div class="cell-val accent">${onTime}<span style="font-size:14px;color:var(--dim)">/${store.history.length}</span></div></div>
      </div>
    `));

    // ── History
    body.appendChild(secLabel('History'));
    const hl = document.createElement('div');
    hl.className = 'stat-card';
    const ll = document.createElement('div');
    ll.className = 'hist-list';

    store.history.slice(0, 20).forEach(h => {
      const done = h.patients.filter(p => p.status === 'done');
      const durs = done.map(p => p.endTime - p.startTime);
      const avg  = durs.length ? fmtMs(durs.reduce((a,b)=>a+b,0)/durs.length) : '—';
      const d    = new Date(h.date + 'T12:00:00');
      const ds   = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
      const row  = document.createElement('div');
      row.className = 'hist-row';
      row.innerHTML = `
        <div class="hist-date">${ds}</div>
        <div class="hist-pts">${done.length}<span> pt</span></div>
        <div class="hist-avg">avg ${avg}</div>
        ${h.onTime !== undefined ? `<div class="hist-badge ${h.onTime ? '' : 'late'}">${h.onTime ? 'ON TIME' : 'LATE'}</div>` : ''}
      `;
      ll.appendChild(row);
    });

    hl.appendChild(ll);
    body.appendChild(hl);
  } else if (!todayEntry) {
    const em = document.createElement('div');
    em.className = 'empty-msg';
    em.textContent = 'No sessions yet.\nStart your first round.';
    body.appendChild(em);
  }

  // Clear data
  const clear = document.createElement('div');
  clear.className = 'danger-zone';
  clear.textContent = '⚠ Clear All Data';
  clear.addEventListener('click', () => {
    if (confirm('Delete all history and sessions?')) {
      localStorage.clear();
      store = { history: [], lastCount: null };
      S.session = null;
      buildStats();
    }
  });
  body.appendChild(clear);
}

function secLabel(txt) {
  const el = document.createElement('div');
  el.className = 'sec-label'; el.textContent = txt;
  return el;
}
function statCard(html) {
  const el = document.createElement('div');
  el.className = 'stat-card'; el.innerHTML = html;
  return el;
}

// Back button: return to session if active, else setup
document.getElementById('back-btn').addEventListener('click', () => {
  if (S.session && S.session.patients.some(p => p.status !== 'done' || S.session.patients.every(p=>p.status==='done'))) {
    // If session exists go back to it (or setup if done)
    const allDone = S.session.patients.every(p => p.status === 'done');
    showScreen(allDone ? 'setup' : 'session');
  } else {
    showScreen('setup');
  }
});

// ── Screen Router ─────────────────────────────
function showScreen(name) {
  S.screen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');

  if (name === 'setup') { stopTicker(); initSetup(); }
  else if (name === 'session') { renderGrid(); startTicker(); }
}

// ── PWA / Service Worker ──────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Boot ──────────────────────────────────────
function boot() {
  // Restore last selected count
  S.selectedCount = store.lastCount || null;

  // Check for an in-progress session from today
  const saved = loadSavedSession();
  if (saved && saved.patients.some(p => p.status !== 'done')) {
    S.session = saved;
    showScreen('session');
  } else {
    showScreen('setup');
  }
}

boot();
</script>
